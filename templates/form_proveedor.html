{% extends "base.html" %}

{% block title %}{% if proveedor %}Editar{% else %}Crear{% endif %} Proveedor{% endblock %}

{% block content %}
<h2>{% if proveedor %}✏️ Editar Proveedor{% else %}➕ Nuevo Proveedor{% endif %}</h2>

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Nombre de la Empresa *</label>
            <input type="text" name="nombre" required value="{{ proveedor['nombre'] if proveedor else '' }}">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Contacto (Persona)</label>
                <input type="text" name="contacto" value="{{ proveedor['contacto'] if proveedor else '' }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ proveedor['email'] if proveedor else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" value="{{ proveedor['telefono'] if proveedor else '' }}">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="direccion" value="{{ proveedor['direccion'] if proveedor else '' }}">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Ciudad</label>
                <input type="text" name="ciudad" value="{{ proveedor['ciudad'] if proveedor else '' }}">
            </div>

            <div class="form-group">
                <label>País</label>
                <input type="text" name="pais" value="{{ proveedor['pais'] if proveedor else '' }}">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">💾 {% if proveedor %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="/proveedores" class="btn" style="background-color: #95a5a6; color: white;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
