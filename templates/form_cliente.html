{% extends "base.html" %}

{% block title %}{% if cliente %}Editar{% else %}Crear{% endif %} Cliente{% endblock %}

{% block content %}
<h2>{% if cliente %}✏️ Editar Cliente{% else %}➕ Nuevo Cliente{% endif %}</h2>

<div class="form-container">
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" name="nombre" required value="{{ cliente['nombre'] if cliente else '' }}">
            </div>

            <div class="form-group">
                <label>Apellido *</label>
                <input type="text" name="apellido" required value="{{ cliente['apellido'] if cliente else '' }}">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ cliente['email'] if cliente else '' }}">
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" name="telefono" value="{{ cliente['telefono'] if cliente else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="direccion" value="{{ cliente['direccion'] if cliente else '' }}">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Ciudad</label>
                <input type="text" name="ciudad" value="{{ cliente['ciudad'] if cliente else '' }}">
            </div>

            <div class="form-group">
                <label>País</label>
                <input type="text" name="pais" value="{{ cliente['pais'] if cliente else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Tipo de Cliente *</label>
            <select name="tipo_cliente" required>
                <option value="Regular" {% if cliente and cliente['tipo_cliente'] == 'Regular' %}selected{% endif %}>Regular</option>
                <option value="Mayorista" {% if cliente and cliente['tipo_cliente'] == 'Mayorista' %}selected{% endif %}>Mayorista</option>
                <option value="VIP" {% if cliente and cliente['tipo_cliente'] == 'VIP' %}selected{% endif %}>VIP</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">💾 {% if cliente %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="/clientes" class="btn" style="background-color: #95a5a6; color: white;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
