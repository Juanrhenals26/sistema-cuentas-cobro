{% extends "base.html" %}

{% block title %}{% if producto %}Editar{% else %}Crear{% endif %} Producto{% endblock %}

{% block content %}
<h2>{% if producto %}✏️ Editar Producto{% else %}➕ Nuevo Producto{% endif %}</h2>

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Nombre del Producto *</label>
            <input type="text" name="nombre" required value="{{ producto['nombre'] if producto else '' }}">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion">{{ producto['descripcion'] if producto else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Categoría *</label>
            <select name="id_categoria" required>
                <option value="">-- Selecciona una categoría --</option>
                {% for cat in categorias %}
                    <option value="{{ cat['id_categoria'] }}" {% if producto and producto['id_categoria'] == cat['id_categoria'] %}selected{% endif %}>
                        {{ cat['nombre'] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Precio Unitario ($) *</label>
            <input type="number" name="precio_unitario" step="0.01" required value="{{ producto['precio_unitario'] if producto else '' }}">
        </div>

        <div class="form-group">
            <label>Cantidad en Stock *</label>
            <input type="number" name="cantidad_stock" required value="{{ producto['cantidad_stock'] if producto else '0' }}">
        </div>

        <div class="form-group">
            <label>Cantidad Mínima (para alertas) *</label>
            <input type="number" name="cantidad_minima" required value="{{ producto['cantidad_minima'] if producto else '10' }}">
        </div>

        <div class="form-group">
            <label>Cantidad Máxima *</label>
            <input type="number" name="cantidad_maxima" required value="{{ producto['cantidad_maxima'] if producto else '500' }}">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">💾 {% if producto %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="/productos" class="btn" style="background-color: #95a5a6; color: white;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
